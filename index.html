<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hinomaru Labs | Official Website</title>
  <meta name="description" content="Hinomaru Labs official website. Coming soon.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://hinomarulabs-ctrl.github.io/">
  <link rel="icon" href="/trader-timer/images/favicon.png" type="image/png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #111315;
      --text: #f5f7fb;
      --muted: #9aa3af;
      --accent: #2f7bff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: radial-gradient(circle at 50% 20%, rgba(47, 123, 255, .18), transparent 32%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    main {
      width: min(100% - 48px, 680px);
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.8;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.7rem, 8vw, 5rem);
      letter-spacing: 0;
      line-height: 1;
    }

    a {
      display: inline-flex;
      margin-top: 28px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 999px;
      padding: 12px 18px;
      color: var(--text);
      text-decoration: none;
      transition: border-color 180ms ease, transform 180ms ease;
    }

    a:hover {
      border-color: rgba(47, 123, 255, .72);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <h1>Hinomaru Labs</h1>
    <p>Official Website</p>
    <p>Coming Soon</p>
    <a href="/trader-timer/">Trader Timer</a>
  </main>
</body>
</html>
